<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Venta de Locro Scout</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="/static/css/formulario.css">
</head>
<body>

    <div class="container">
        <h2>Venta de Locro<br><small>Vendedor: {{ vendedor }}</small></h2>
        
        <form id="ventaForm">
            <input type="hidden" name="vendedor" value="{{ vendedor }}">

            <label for="nombre">Nombre del comprador:</label>
            <input type="text" id="nombre" name="nombre" required minlength="2" pattern="[A-Za-zÁ-Úá-úñÑ\s]+" title="Solo letras y espacios, mínimo 2 caracteres" placeholder="Ej: Juan">

            <label for="apellido">Apellido del comprador:</label>
            <input type="text" id="apellido" name="apellido" required minlength="2" pattern="[A-Za-zÁ-Úá-úñÑ\s]+" title="Solo letras y espacios, mínimo 2 caracteres" placeholder="Ej: Pérez">

            <label for="telefono">Teléfono (Celular):</label>
            <input type="tel" id="telefono" name="telefono" required placeholder="Ej: 1123456789" minlength="10" maxlength="15" title="Deben ser 10 números (ej. 1123456789 sin el 15)">

            <label for="mail">Mail (Opcional):</label>
            <input type="email" id="mail" name="mail" placeholder="ejemplo@correo.com">

            <label>Modalidad de entrega:</label>
            <div class="radio-group" onchange="toggleDireccion()">
                <label>
                    <input type="radio" name="entrega" value="retiro" checked>
                    <span>Lo retira</span>
                </label>
                <label>
                    <input type="radio" name="entrega" value="delivery">
                    <span>Delivery</span>
                </label>
            </div>

            <div id="div-direccion" style="display: none;">
                <label for="direccion">Dirección de entrega:</label>
                <input type="text" id="direccion" name="direccion" minlength="5" placeholder="Ej: Laprida 4500, Villa Martelli">
            </div>

            <label for="cantidad">Cantidad de porciones:</label>
            <input type="number" id="cantidad" name="cantidad" min="1" value="1" required oninput="calcularTotal()">
            <small style="color: #666;">$10.000 c/u - Promoción: 2 por $18.000</small>

            <div class="total-box">
                Total a cobrar: $<span id="precio-total">10.000</span>
            </div>

            <label>Estado del pago:</label>
            <div class="radio-group">
                <label>
                    <input type="radio" name="pago" value="pagado" required>
                    <span>Ya lo pagó</span>
                </label>
                <label>
                    <input type="radio" name="pago" value="al_recibir">
                    <span>Abona al recibir</span>
                </label>
            </div>

            <button type="submit" class="btn-submit">Anotar Venta</button>
        </form>
    </div>

    <script src="/static/js/formulario.js"></script>

</body>
</html>
